name: Deploy to cPanel

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --prefix site

      - name: Build site
        run: npm run build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.CPANEL_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 22 ${{ secrets.CPANEL_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy site
        run: |
          tar czf site.tar.gz -C site/out .
          scp -P 22 -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            site.tar.gz \
            ${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }}:~/site.tar.gz
          ssh -p 22 -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            ${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }} \
            "mkdir -p '${{ secrets.CPANEL_TARGET_DIR }}' && cd '${{ secrets.CPANEL_TARGET_DIR }}' && find . -mindepth 1 -maxdepth 1 ! -name '.well-known' -exec rm -rf {} + && tar xzf ~/site.tar.gz && rm ~/site.tar.gz"
